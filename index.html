<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carte des Restaurants — Digital Value</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    :root {
      --panel-width: 380px;
      --brand: #0b57d0;
      --muted: #6b7280;
      --bg: #ffffff;
    }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #app { height: 100%; display: grid; grid-template-columns: 1fr; }
    #map { height: 100%; width: 100%; }
    .leaflet-popup-content { font-size: 14px; line-height: 1.35; }

    /* Title chip (top-left) */
    .titlechip {
      position: absolute; z-index: 1000; left: 12px; top: 12px;
      background: rgba(255,255,255,.95); padding: 8px 12px; border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08); font-size: 14px; font-weight: 600;
    }

    /* Filters box */
    #filters {
      position: absolute; z-index: 1001; left: 12px; top: 58px;
      width: 300px; background: var(--bg); border: 1px solid #eee; border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      padding: 12px; display: grid; gap: 10px;
    }
    #filters h3 { margin: 0 0 4px; font-size: 14px; }
    #filters .row { display: grid; gap: 6px; }
    #filters input[type="text"], #filters select {
      width: 100%; padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px;
      box-sizing: border-box;
    }
    #filters .actions { display: flex; gap: 8px; align-items: center; }
    #filters button, #filters a.btn {
      border: 0; background: var(--brand); color: #fff; padding: 8px 10px; border-radius: 8px; font-size: 13px; cursor: pointer;
      text-decoration: none; display: inline-block; text-align: center;
    }
    #filters .reset { background: #f3f4f6; color: #111827; }
    #filters .cta { display: grid; gap: 8px; margin-top: 4px; }

    /* Multi-select dropdowns (Price / Food) */
    .multiselect { position: relative; }
    .ms-trigger {
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 10px; cursor: pointer; background: #fff;
    }
    .ms-panel {
      position: absolute; left: 0; right: 0; top: calc(100% + 6px); z-index: 1200;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.08);
      padding: 8px; display: none; max-height: 260px; overflow: auto;
    }
    .multiselect.open .ms-panel { display: block; }
    .ms-head {
      display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px;
      font-size: 12px; color: var(--muted);
    }
    .ms-head .link { color: var(--brand); cursor: pointer; }
    .ms-opt { display: flex; align-items: center; gap: 8px; padding: 6px 4px; font-size: 14px; }
    .ms-count { color: var(--muted); font-size: 12px; }

    /* Search with autocomplete + tokens */
    .tokenbox { position: relative; }
    .tokenlist {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .token {
      background: #e8f0ff; color: #0b57d0; border: 1px solid #c7dcff; border-radius: 999px; padding: 4px 8px; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .token .x { cursor: pointer; }
    .ac-list {
      position: absolute; left: 0; right: 0; top: 100%; z-index: 1200;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.08);
      max-height: 240px; overflow: auto; display: none;
    }
    .ac-item { padding: 8px 10px; cursor: pointer; }
    .ac-item:hover { background: #f3f4f6; }

    /* Distance slider */
    .sliderrow { display: grid; gap: 6px; }
    .sliderwrap { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
    input[type="range"] { width: 100%; }

    /* Side panel (details) */
    #panel {
      position: absolute; right: 0; top: 0; height: 100%; width: var(--panel-width);
      background: #fff; box-shadow: -8px 0 24px rgba(0,0,0,.08);
      transform: translateX(100%); transition: transform .25s ease; z-index: 1100;
      display: flex; flex-direction: column;
    }
    #panel.active { transform: translateX(0); }
    #panel header {
      padding: 16px 18px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px;
    }
    #panel header h2 { margin: 0; font-size: 18px; line-height: 1.2; }
    #panel header .close {
      margin-left: auto; border: 0; background: #f3f4f6; width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      font-size: 18px;
    }
    #panel .body { padding: 14px 18px; overflow-y: auto; }
    .meta { color: var(--muted); font-size: 13px; display: grid; gap: 4px; margin: 6px 0 12px; }
    .pill { display: inline-block; background: #f3f4f6; color: #111827; font-size: 12px; padding: 4px 8px; border-radius: 999px; margin-right: 6px; }
    .section-title { font-weight: 600; margin: 14px 0 8px; }
    .reviews { max-height: 50vh; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; padding: 10px; background: #fafafa; }
    .review { padding: 8px 0; border-bottom: 1px dashed #e5e7eb; }
    .review:last-child { border-bottom: 0; }
    .muted { color: var(--muted); }

    /* Marker visual states */
    .dimmed   { filter: grayscale(100%) opacity(0.35); }
    .highlight{ filter: drop-shadow(0 0 8px var(--brand)) saturate(1.15); transform: scale(1.06); }

    /* Keep zoom control visible (bottom-left) */
    .leaflet-bottom.leaflet-left { margin-left: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="titlechip">Carte des restaurants — Digital Value</div>

    <!-- Filters box -->
    <div id="filters">
      <h3>Filtres</h3>

      <!-- Search with autocomplete & tokens -->
      <div class="row tokenbox">
        <div id="tok-container" class="tokenlist"></div>
        <input id="f-search" type="text" placeholder="Rechercher ou sélectionner un resto…" autocomplete="off" />
        <div id="ac" class="ac-list"></div>
      </div>

      <!-- Distance slider -->
      <div class="row sliderrow">
        <label for="f-distance">Temps depuis le bureau</label>
        <div class="sliderwrap">
          <input id="f-distance" type="range" min="0" max="30" step="1" value="30" />
          <div><span id="f-distance-val">≤ 30</span> min</div>
        </div>
      </div>

      <!-- Price multi-select -->
      <div class="row">
        <div class="multiselect" id="ms-price">
          <div class="ms-trigger" data-label="Prix">
            <span id="ms-price-label">Prix</span>
            <span class="ms-count" id="ms-price-count"></span>
          </div>
          <div class="ms-panel" id="ms-price-panel">
            <div class="ms-head">
              <span>Prix</span>
              <span>
                <span class="link" id="price-select-all">Tout</span> ·
                <span class="link" id="price-select-none">Aucun</span>
              </span>
            </div>
            <!-- options injected -->
          </div>
        </div>
      </div>

      <!-- Food type multi-select -->
      <div class="row">
        <div class="multiselect" id="ms-food">
          <div class="ms-trigger" data-label="Type de cuisine">
            <span id="ms-food-label">Type de cuisine</span>
            <span class="ms-count" id="ms-food-count"></span>
          </div>
          <div class="ms-panel" id="ms-food-panel">
            <div class="ms-head">
              <span>Type de cuisine</span>
              <span>
                <span class="link" id="food-select-all">Tout</span> ·
                <span class="link" id="food-select-none">Aucun</span>
              </span>
            </div>
            <!-- options injected -->
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="f-zoom">Zoom sur les résultats</button>
        <button id="f-reset" class="reset">Réinitialiser</button>
      </div>

      <!-- CTAs to Forms -->
      <div class="cta">
        <a class="btn" target="_blank" rel="noopener"
           href="https://docs.google.com/forms/d/e/1FAIpQLScCMY-av6uPlNI6kqnJZi4hRwDdkeaNYb5-VruNraSp42rg0Q/viewform?usp=dialog">
          ➕ Ajouter un restaurant
        </a>
        <a class="btn" target="_blank" rel="noopener"
           href="https://docs.google.com/forms/d/e/1FAIpQLScCMY-av6uPlNI6kqnJZi4hRwDdkeaNYb5-VruNraSp42rg0Q/viewform?usp=dialog">
          ✍️ Laisser un avis
        </a>
      </div>
    </div>

    <!-- Side panel -->
    <aside id="panel">
      <header>
        <h2 id="p-title">Détails</h2>
        <button class="close" id="p-close" title="Fermer">×</button>
      </header>
      <div class="body">
        <div id="p-meta" class="meta"></div>
        <div id="p-pills"></div>
        <div class="section-title">Avis récents</div>
        <div id="p-reviews" class="reviews"></div>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    // 👉 Replace with your Publish-to-web CSV of 'mymaps_export'
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRE7LBwALNw3m9kW1XrGh5QnvFuMI2Z4TT8aAI8JA7v4S8WAb8BUVoKzCZSFMwLivFVBjsKjWZUVxPg/pub?gid=1935701035&single=true&output=csv";

    // --- Map (zoom controls bottom-left) & base layer ---
    const office = { lat: 48.8740172, lng: 2.3105188, name: "Kwerk Saint Honoré" };
    const defaultZoom = 15;
    const map = L.map('map', { zoomControl: false }).setView([office.lat, office.lng], defaultZoom);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> ' +
        '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    // Office marker
    const officeMarker = L.circleMarker([office.lat, office.lng], {
      radius: 8, color: '#d33', fillColor: '#d33', fillOpacity: 1, weight: 2
    }).addTo(map).bindPopup(`<b>${office.name}</b>`);

    // State
    const all = { data: [], markers: [] }; // { marker, data, key }
    let selectedMarker = null;

    // Helpers
    const toNum = v => {
      const n = parseFloat(String(v).replace(',', '.'));
      return Number.isFinite(n) ? n : null;
    };
    const norm = s => String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const keyOf = r => `${(r.restaurant_name||'').trim()} — ${(r.restaurant_adress||'').trim()}`;

    function simplePopup(row) {
      const name = row.restaurant_name || '';
      const addr = row.restaurant_adress || '';
      const avg  = row.avg_rating || '-';
      const cnt  = row.reviews_count || 0;
      const dist = row.distance_in_min ? `${row.distance_in_min} min` : '';
      return `
        <div style="min-width:220px">
          <b>${name}</b><br/>
          ${addr}<br/>
          ⭐ ${avg} (${cnt} avis) ${dist ? ' · 🕒 ' + dist : ''}
        </div>`;
    }

    function renderReviews(htmlOrText) {
      if (!htmlOrText) return '<div class="muted">Aucun avis pour le moment.</div>';
      const hasTag = /<\w+[^>]*>/.test(htmlOrText);
      if (hasTag) return htmlOrText;
      const safe = String(htmlOrText).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return safe.split(/\n{2,}/).map(block => `<div class="review">${block.replace(/\n/g,'<br/>')}</div>`).join('');
    }

    function updatePanel(row) {
      document.getElementById('p-title').innerText = row.restaurant_name || '';
      const meta = [];
      if (row.restaurant_adress) meta.push(row.restaurant_adress);
      const ratingText = `⭐ ${row.avg_rating || '-'} (${row.reviews_count || 0} avis)`;
      meta.push(ratingText);
      if (row.distance_in_min) meta.push(`🕒 ${row.distance_in_min} min depuis le bureau`);
      document.getElementById('p-meta').innerHTML = meta.map(m => `<div>${m}</div>`).join('');

      const pills = [];
      if (row.food_type) pills.push(`<span class="pill">${row.food_type}</span>`);
      if (row.price_range) pills.push(`<span class="pill">${row.price_range}</span>`);
      document.getElementById('p-pills').innerHTML = pills.join(' ');

      document.getElementById('p-reviews').innerHTML = renderReviews(row.reviews_html);
      document.getElementById('panel').classList.add('active');
    }

    function clearSelection() {
      selectedMarker = null;
      all.markers.forEach(m => m.marker.getElement()?.classList.remove('highlight'));
      document.getElementById('panel').classList.remove('active');
      map.closePopup();
    }

    document.getElementById('p-close').addEventListener('click', clearSelection);
    map.on('click', (e) => {
      if (!e.originalEvent.target.closest('.leaflet-marker-icon') &&
          !e.originalEvent.target.closest('.leaflet-popup')) {
        clearSelection();
      }
    });

    function enableHoverPinBehavior(marker, row = null) {
      marker._pinned = false;

      marker.on('mouseover', function () { if (!this._pinned) this.openPopup(); });
      marker.on('mouseout',  function () { if (!this._pinned) this.closePopup(); });
      marker.on('click', function (ev) {
        const el = this.getElement();
        const nowPinned = !this._pinned;

        all.markers.forEach(m => { m.marker._pinned = false; m.marker.getElement()?.classList.remove('highlight'); });

        if (nowPinned) {
          this._pinned = true;
          this.openPopup();
          el?.classList.add('highlight');
          if (row) updatePanel(row);
          selectedMarker = this;
        } else {
          clearSelection();
        }
        ev.originalEvent?.stopPropagation?.();
      });
    }

    // ---------- FILTERS UI ----------
    const elSearch   = document.getElementById('f-search');
    const elTokBox   = document.getElementById('tok-container');
    const elAC       = document.getElementById('ac');
    const elRange    = document.getElementById('f-distance');
    const elRangeVal = document.getElementById('f-distance-val');

    const msPrice       = document.getElementById('ms-price');
    const msPriceTrig   = msPrice.querySelector('.ms-trigger');
    const msPricePanel  = document.getElementById('ms-price-panel');
    const msPriceCount  = document.getElementById('ms-price-count');
    const priceSelectAll= document.getElementById('price-select-all');
    const priceSelectNone=document.getElementById('price-select-none');

    const msFood        = document.getElementById('ms-food');
    const msFoodTrig    = msFood.querySelector('.ms-trigger');
    const msFoodPanel   = document.getElementById('ms-food-panel');
    const msFoodCount   = document.getElementById('ms-food-count');
    const foodSelectAll = document.getElementById('food-select-all');
    const foodSelectNone= document.getElementById('food-select-none');

    const elZoomBtn  = document.getElementById('f-zoom');
    const elResetBtn = document.getElementById('f-reset');

    // Multi-select state
    const selectedPrices = new Set();
    const selectedFoods  = new Set();
    const selectedKeys   = new Set(); // restaurant tokens

    function toggleMS(container, open) {
      if (open === undefined) container.classList.toggle('open');
      else container.classList.toggle('open', open);
    }
    msPriceTrig.addEventListener('click', () => toggleMS(msPrice));
    msFoodTrig.addEventListener('click', () => toggleMS(msFood));
    document.addEventListener('click', (e) => {
      if (!msPrice.contains(e.target)) toggleMS(msPrice, false);
      if (!msFood.contains(e.target))  toggleMS(msFood, false);
      if (!elAC.contains(e.target) && e.target !== elSearch) elAC.style.display = 'none';
    });

    function renderMS(panel, values, selectedSet, countEl) {
      // Remove old options (keep header)
      panel.querySelectorAll('.ms-opt').forEach(n => n.remove());

      values.forEach(v => {
        const id = `${panel.id}-${v}`;
        const row = document.createElement('label');
        row.className = 'ms-opt';
        row.innerHTML = `<input type="checkbox" id="${id}" ${selectedSet.has(v)?'checked':''} /> <span>${v}</span>`;
        panel.appendChild(row);
        row.querySelector('input').addEventListener('change', (ev) => {
          if (ev.target.checked) selectedSet.add(v); else selectedSet.delete(v);
          updateMSCount(countEl, selectedSet, values);
          applyFilters(true);
        });
      });

      updateMSCount(countEl, selectedSet, values);
    }

    function updateMSCount(countEl, selectedSet, values) {
      if (selectedSet.size === 0) countEl.textContent = ''; // no filter
      else if (selectedSet.size === values.length) countEl.textContent = '(tous)';
      else countEl.textContent = `(${selectedSet.size})`;
    }

    // Distance slider
    function updateSliderLabel() {
      const v = parseInt(elRange.value,10);
      elRangeVal.textContent = '≤ ' + v;
    }
    elRange.addEventListener('input', () => { updateSliderLabel(); applyFilters(false); });

    // Tokens (selected restaurants)
    function renderTokens() {
      elTokBox.innerHTML = '';
      selectedKeys.forEach(k => {
        const div = document.createElement('div');
        div.className = 'token';
        div.innerHTML = `<span>${k}</span> <span class="x" title="Retirer">×</span>`;
        div.querySelector('.x').addEventListener('click', () => { selectedKeys.delete(k); renderTokens(); applyFilters(true); });
        elTokBox.appendChild(div);
      });
    }

    // Autocomplete
    function updateACList() {
      const q = norm(elSearch.value);
      if (!q) { elAC.style.display = 'none'; elAC.innerHTML=''; return; }
      const options = all.data
        .map(r => ({ key: keyOf(r), hay: norm(keyOf(r)) }))
        .filter(o => o.hay.includes(q) && !selectedKeys.has(o.key))
        .slice(0, 20);

      if (!options.length) { elAC.style.display = 'none'; elAC.innerHTML=''; return; }

      elAC.innerHTML = options.map(o => `<div class="ac-item" data-key="${o.key}">${o.key}</div>`).join('');
      elAC.style.display = 'block';
    }
    elSearch.addEventListener('input', updateACList);
    elAC.addEventListener('click', (e) => {
      const item = e.target.closest('.ac-item');
      if (!item) return;
      const k = item.dataset.key;
      selectedKeys.add(k);
      elSearch.value = '';
      elAC.style.display = 'none';
      renderTokens();
      applyFilters(true);
    });

    // Select all/none handlers
    priceSelectAll.addEventListener('click', () => {
      priceValues.forEach(v => selectedPrices.add(v));
      renderMS(msPricePanel, priceValues, selectedPrices, msPriceCount);
      applyFilters(true);
    });
    priceSelectNone.addEventListener('click', () => {
      selectedPrices.clear();
      renderMS(msPricePanel, priceValues, selectedPrices, msPriceCount);
      applyFilters(true);
    });
    foodSelectAll.addEventListener('click', () => {
      foodValues.forEach(v => selectedFoods.add(v));
      renderMS(msFoodPanel, foodValues, selectedFoods, msFoodCount);
      applyFilters(true);
    });
    foodSelectNone.addEventListener('click', () => {
      selectedFoods.clear();
      renderMS(msFoodPanel, foodValues, selectedFoods, msFoodCount);
      applyFilters(true);
    });

    // Reset & Zoom
    elResetBtn.addEventListener('click', () => {
      // Clear filters
      elSearch.value = ''; elAC.style.display='none'; selectedKeys.clear(); renderTokens();
      elRange.value = 30; updateSliderLabel();
      selectedPrices.clear(); selectedFoods.clear();
      renderMS(msPricePanel, priceValues, selectedPrices, msPriceCount);
      renderMS(msFoodPanel,  foodValues,  selectedFoods,  msFoodCount);
      // Apply + reset selection and zoom
      applyFilters(true);
      map.setView([office.lat, office.lng], defaultZoom);
    });
    elZoomBtn.addEventListener('click', () => fitToFiltered());

    // ---------- Filtering logic (GREY OUT, not hide) ----------
    function passFilters(row) {
      // If specific restaurants selected (tokens), only those match
      if (selectedKeys.size) {
        if (!selectedKeys.has(keyOf(row))) return false;
      } else {
        // Text query (when no tokens)
        const q = norm(elSearch.value);
        if (q) {
          const hay = norm((row.restaurant_name||'') + ' ' + (row.restaurant_adress||''));
          if (!hay.includes(q)) return false;
        }
      }

      // Distance (rows without distance are treated as not matching unless slider is 30)
      const maxMin = parseInt(elRange.value, 10); // 0..30
      const d = parseInt(row.distance_in_min, 10);
      if (isNaN(d)) {
        if (maxMin < 30) return false; // include unknown distance only when slider at max
      } else if (d > maxMin) {
        return false;
      }

      // Price multi-select
      if (selectedPrices.size && !selectedPrices.has(String(row.price_range || '').trim())) return false;
      // Food multi-select
      if (selectedFoods.size && !selectedFoods.has(String(row.food_type || '').trim())) return false;

      return true;
    }

    function applyFilters(resetSelection = false) {
      if (resetSelection) clearSelection();

      all.markers.forEach(({ marker, data }) => {
        const el = marker.getElement();
        if (!el) return;
        if (passFilters(data)) {
          el.classList.remove('dimmed');
        } else {
          el.classList.add('dimmed');
        }
      });
    }

    function fitToFiltered() {
      const bounds = L.latLngBounds();
      let added = 0;
      all.markers.forEach(({ marker }) => {
        const el = marker.getElement();
        if (el && !el.classList.contains('dimmed')) {
          bounds.extend(marker.getLatLng());
          added++;
        }
      });
      if (added > 0) map.fitBounds(bounds.pad(0.1), { maxZoom: 17 });
    }

    // ---------- Load CSV & init UI ----------
    let priceValues = []; let foodValues = [];

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const data = results.data || [];
        all.data = data;

        // Gather unique values from data
        priceValues = Array.from(new Set(
          data.map(r => String(r.price_range || '').trim()).filter(Boolean)
        )).sort((a,b) => a.length - b.length || a.localeCompare(b));
        foodValues = Array.from(new Set(
          data.map(r => String(r.food_type || '').trim()).filter(Boolean)
        )).sort((a,b) => a.localeCompare(b));

        // Render multi-select panels
        renderMS(msPricePanel, priceValues, selectedPrices, msPriceCount);
        renderMS(msFoodPanel,  foodValues,  selectedFoods,  msFoodCount);

        // Create markers
        const bounds = L.latLngBounds([ [office.lat, office.lng] ]);
        data.forEach(row => {
          const lat = toNum(row.lat);
          const lng = toNum(row.long);
          if (lat == null || lng == null) return;

          const marker = L.marker([lat, lng]).addTo(map).bindPopup(simplePopup(row));
          enableHoverPinBehavior(marker, row);
          all.markers.push({ marker, data: row, key: keyOf(row) });
          bounds.extend([lat, lng]);
        });

        if (all.markers.length) {
          map.fitBounds(bounds.pad(0.1), { maxZoom: 17 });
        } else {
          map.setView([office.lat, office.lng], defaultZoom);
        }

        // Initial state
        updateSliderLabel();
        applyFilters(false);
      },
      error: function(err) {
        console.error("Erreur de chargement du CSV:", err);
      }
    });
  </script>
</body>
</html>
